name: Publish Package Repos

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (e.g. v1.0.3)
        required: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check GPG key availability
        id: gpg-check
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Warning: GPG_PRIVATE_KEY secret not set — packages will not be signed"
          fi

      - name: Install repo tools
        run: sudo apt-get install -y dpkg-dev apt-utils createrepo-c

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p _dl
          gh release download "$TAG" --dir _dl -R "${{ github.repository }}"
          ls -lh _dl/

      - name: Build APT repo
        run: |
          mkdir -p apt
          cp _dl/*.deb apt/ 2>/dev/null || true
          cd apt
          dpkg-scanpackages -m . > Packages
          gzip -k -f Packages
          apt-ftparchive release . > Release

      - name: Build YUM repos
        run: |
          for arch in x86_64 aarch64; do
            mkdir -p "rpm/${arch}"
            find _dl -name "*${arch}.rpm" ! -name "*.src.rpm" -exec cp {} "rpm/${arch}/" \;
            if ls "rpm/${arch}"/*.rpm 2>/dev/null | head -1 > /dev/null 2>&1; then
              createrepo_c "rpm/${arch}/"
            fi
          done

      - name: Import GPG key
        if: steps.gpg-check.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep sec | awk '{print $2}' | cut -d'/' -f2 | head -1)
          echo "KEY_ID=${KEY_ID}" >> "$GITHUB_ENV"

      - name: Sign APT Release
        if: steps.gpg-check.outputs.available == 'true'
        run: |
          gpg --batch --yes --armor --detach-sign \
            --default-key "$KEY_ID" -o apt/Release.gpg apt/Release
          gpg --batch --yes --clearsign \
            --default-key "$KEY_ID" -o apt/InRelease apt/Release

      - name: Sign YUM repomd.xml
        if: steps.gpg-check.outputs.available == 'true'
        run: |
          for arch in x86_64 aarch64; do
            REPOMD="rpm/${arch}/repodata/repomd.xml"
            if [ -f "$REPOMD" ]; then
              gpg --batch --yes --armor --detach-sign \
                --default-key "$KEY_ID" -o "${REPOMD}.asc" "$REPOMD"
            fi
          done

      - name: Copy public key
        run: |
          if [ -f src/public.gpg ]; then
            cp src/public.gpg public.gpg
          fi

      - name: Generate index page
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%%/*}"
          NAME="${REPO##*/}"
          BASE="https://${OWNER}.github.io/${NAME}"
          cat > index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>ps_mem package repository</title></head>
          <body>
          <h1>ps_mem package repository</h1>
          <p>Latest: <strong>${TAG}</strong></p>
          <h2>APT (Debian / Ubuntu)</h2>
          <pre>
          curl -fsSL ${BASE}/public.gpg | sudo gpg --dearmor -o /usr/share/keyrings/ps-mem.gpg
          echo "deb [signed-by=/usr/share/keyrings/ps-mem.gpg] ${BASE}/apt /" | sudo tee /etc/apt/sources.list.d/ps-mem.list
          sudo apt-get update &amp;&amp; sudo apt-get install -y ps-mem
          </pre>
          <h2>DNF / YUM (RHEL / Rocky / Fedora)</h2>
          <pre>
          sudo rpm --import ${BASE}/public.gpg
          sudo tee /etc/yum.repos.d/ps-mem.repo &lt;&lt;'REPO'
          [ps-mem]
          name=ps_mem
          baseurl=${BASE}/rpm/\$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=${BASE}/public.gpg
          REPO
          sudo dnf install -y ps_mem
          </pre>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: true
          exclude_assets: 'src/**,_dl/**'
