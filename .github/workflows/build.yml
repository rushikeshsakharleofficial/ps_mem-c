name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (arm64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Build binary
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            aarch64-linux-gnu-gcc -O2 -o ps_mem ps_mem.c
          else
            gcc -O2 -o ps_mem ps_mem.c
          fi

      - name: Package DEB
        env:
          VER: ${{ steps.ver.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          PKG="ps-mem_${VER}_${ARCH}"
          mkdir -p "${PKG}/DEBIAN" "${PKG}/usr/bin" "${PKG}/usr/share/doc/ps-mem"
          install -m755 ps_mem "${PKG}/usr/bin/ps_mem"
          install -m644 README.md "${PKG}/usr/share/doc/ps-mem/README.md"
          printf 'Package: ps-mem\nVersion: %s\nArchitecture: %s\nMaintainer: Rushikesh Sakharle <ramsharath@instantly.ai>\nDepends: libc6\nSection: utils\nPriority: optional\nHomepage: https://github.com/rushikeshsakharleofficial/ps_mem-c\nDescription: C port of ps_mem with smaps_rollup optimization\n Reads /proc/<pid>/smaps_rollup for 2.2x speedup over original.\n Falls back to full smaps on kernels older than 4.4.\n' \
            "$VER" "$ARCH" > "${PKG}/DEBIAN/control"
          dpkg-deb --build "${PKG}"

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.arch }}
          path: '*.deb'

  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          dnf install -y gcc rpm-build
          if [ "$ARCH" = "aarch64" ]; then
            dnf install -y gcc-aarch64-linux-gnu || true
          fi

      - name: Extract version
        id: ver
        run: |
          if echo "${GITHUB_REF}" | grep -q '^refs/tags/'; then
            VER=$(echo "${GITHUB_REF_NAME}" | sed 's/^v//')
          else
            VER="0.0.0"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "aarch64" ]; then
            aarch64-linux-gnu-gcc -O2 -o ps_mem ps_mem.c || gcc -O2 -o ps_mem ps_mem.c
          else
            gcc -O2 -o ps_mem ps_mem.c
          fi

      - name: Build RPM
        env:
          VER: ${{ steps.ver.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          mkdir -p "ps_mem-${VER}"
          cp ps_mem ps_mem.c README.md "ps_mem-${VER}/"
          tar czf ~/rpmbuild/SOURCES/ps_mem-${VER}.tar.gz "ps_mem-${VER}/"

          cp packaging/ps_mem.spec ~/rpmbuild/SPECS/ps_mem.spec

          rpmbuild -ba \
            --define "pkg_version ${VER}" \
            --target "${ARCH}" \
            ~/rpmbuild/SPECS/ps_mem.spec

          find ~/rpmbuild/RPMS -name '*.rpm' ! -name '*.src.rpm' -exec cp {} . \;
          find ~/rpmbuild/SRPMS -name '*.src.rpm' -exec cp {} . \;

      - uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.arch }}
          path: '*.rpm'

  release:
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - name: List packages
        run: ls -lh dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: false
